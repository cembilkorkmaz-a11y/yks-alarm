<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YKS 2026 Canlı Alarm Radarı - KESİN SES TESTİ</title>
    <style>
        body { background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; font-family: sans-serif; }
        .box { background: #1a1a1a; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; box-sizing: border-box; }
        h1 { color: #ff4757; font-size: 24px; margin-bottom: 10px; }
        button { background: #2ed573; color: white; border: none; padding: 20px; border-radius: 50px; font-weight: bold; width: 100%; font-size: 16px; margin-top: 20px; cursor: pointer; }
        #durum { margin-top: 20px; font-weight: bold; color: #ffa502; }
        @keyframes flash { 0% { background-color: #000; } 50% { background-color: #ff4757; } 100% { background-color: #000; } }
        .alarm-triggered { animation: flash 0.3s infinite; }
    </style>
</head>
<body>
<div class="box">
    <h1>🚨 YKS 2026 Yapay Zeka Alarmı</h1>
    <p>İnternetsiz çalışan yerel ses motoru entegre edildi.</p>
    <button id="btn">🔔 TESTİ BAŞLAT (KESİN ÇALAR)</button>
    <div id="durum">Durum: Test Bekleniyor...</div>
</div>

<script>
    let audioCtx = null;
    let alarmInterval = null;

    // Telefonun kendi içindeki bip sesi motorunu tetikleyen fonksiyon
    function playBeep(frequency, duration) {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime); // Ses tonu kalınlığı
        gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime); // Maksimum ses seviyesi
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.start();
        
        // Sesi yumuşakça bitirerek kesilmesini sağla
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        oscillator.stop(audioCtx.currentTime + duration);
    }

    document.getElementById('btn').addEventListener('click', () => {
        document.getElementById('durum').innerText = "1.5 saniye sonra yüksek sesli bip başlayacak...";
        
        setTimeout(() => {
            document.body.classList.add('alarm-triggered');
            document.getElementById('durum').innerText = "🚨 ALARM AKTİF! OYNATILIYOR... 🚨";
            document.getElementById('durum').style.color = "#ff4757";

            // Her 0.5 saniyede bir kesintisiz "BİP" sesi üretir (Gerçek dijital saat alarmı gibi)
            if(!alarmInterval) {
                alarmInterval = setInterval(() => {
                    playBeep(880, 0.2); // 880Hz tizliğinde, 0.2 saniye süren net bip sesi
                }, 400);
            }
        }, 1500);
    });
</script>
</body>
</html>
