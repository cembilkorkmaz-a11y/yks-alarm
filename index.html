<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>YKS 2026 Canlı Alarm Radarı</title>
    <style>
        body { background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; font-family: sans-serif; }
        .box { background: #1a1a1a; padding: 30px; border-radius: 20px; width: 85%; }
        h1 { color: #ff4757; }
        button { background: #2ed573; color: white; border: none; padding: 20px; border-radius: 50px; font-weight: bold; width: 100%; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="box">
    <h1>🚨 YKS 2026 Alarm</h1>
    <p id="durum">Durum: Bekleniyor...</p>
    <button id="btn">🔔 SESİ VE ALARMI AKTİF ET</button>
</div>
<script>
    const audio = new Audio('https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg');
    audio.volume = 1.0; // Sesi maksimuma zorla
    audio.loop = true;

    document.getElementById('btn').addEventListener('click', () => {
        // Tarayıcı kısıtlamasını aşmak için bir kez boş oynat
        audio.play().then(() => {
            audio.pause();
            audio.currentTime = 0;
            document.getElementById('durum').innerText = "Durum: Canlı İzleniyor... (Ses Maksimumda)";
            document.getElementById('btn').innerText = "✅ İZLENİYOR";
            document.getElementById('btn').style.background = "#57606f";
        });
    });
</script>
</body>
</html>
